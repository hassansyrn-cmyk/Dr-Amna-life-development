<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>الدكتورة آمنة | للاستشارات الحياتية</title>
  <meta name="description" content="موقع الدكتورة آمنة للاستشارات الحياتية وتطوير نمط الحياة، جلسات أونلاين مريحة لتنظيم الأهداف وبناء العادات وتحسين جودة الحياة اليومية." />
  <meta name="theme-color" content="#4A6760" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@300;400;500;600;700;800;900&display=swap" />
  <style>
    :root {
      --bg: #f8f9f6;
      --bg-soft: #fffdf8;
      --paper: #ffffff;
      --cream: #f3ede2;
      --primary: #4a6760;
      --primary-2: #5f8278;
      --primary-3: #9caf9f;
      --accent: #d4a373;
      --accent-2: #b8865b;
      --rose: #c7897f;
      --mint: #dfe9e3;
      --sage: #708579;
      --ink: #26342f;
      --muted: #6d7b75;
      --line: rgba(38, 52, 47, 0.13);
      --glass: rgba(255, 255, 255, 0.72);
      --glass-strong: rgba(255, 255, 255, 0.90);
      --shadow: 0 26px 70px rgba(54, 75, 68, 0.16);
      --shadow-soft: 0 14px 42px rgba(54, 75, 68, 0.10);
      --shadow-accent: 0 20px 52px rgba(212, 163, 115, 0.22);
      --radius-xl: 40px;
      --radius-lg: 30px;
      --radius-md: 22px;
      --max: 1180px;
      --header-height: 82px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    .dark-mode {
      --bg: #18211e;
      --bg-soft: #202b27;
      --paper: #23302b;
      --cream: #2a3832;
      --primary: #dfe9e3;
      --primary-2: #b7c8bf;
      --primary-3: #7e9a8f;
      --accent: #e0b07f;
      --accent-2: #f1c795;
      --rose: #d59d94;
      --mint: #2f423a;
      --sage: #b2c5bc;
      --ink: #eef5f1;
      --muted: #b9c8c1;
      --line: rgba(255, 255, 255, 0.14);
      --glass: rgba(35, 48, 43, 0.74);
      --glass-strong: rgba(35, 48, 43, 0.92);
      --shadow: 0 26px 70px rgba(0, 0, 0, 0.32);
      --shadow-soft: 0 14px 42px rgba(0, 0, 0, 0.24);
      --shadow-accent: 0 20px 52px rgba(224, 176, 127, 0.13);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
      scroll-padding-top: 110px;
    }

    body {
      font-family: "Cairo", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 9% 0%, rgba(212, 163, 115, 0.22), transparent 32%),
        radial-gradient(circle at 92% 13%, rgba(74, 103, 96, 0.20), transparent 34%),
        linear-gradient(180deg, var(--bg), var(--bg-soft), var(--bg));
      overflow-x: hidden;
      min-height: 100vh;
    }

    body.en {
      direction: ltr;
    }

    body.no-scroll {
      overflow: hidden;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    img,
    video {
      display: block;
      width: 100%;
      max-width: 100%;
    }

    img {
      background: var(--cream);
      color: transparent;
      font-size: 0;
    }

    ::selection {
      background: rgba(212, 163, 115, 0.32);
      color: var(--ink);
    }

    .container {
      width: min(var(--max), calc(100% - 34px));
      margin-inline: auto;
    }

    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .scroll-progress {
      position: fixed;
      top: 0;
      inset-inline-start: 0;
      width: 0%;
      height: 4px;
      z-index: 3000;
      background: linear-gradient(90deg, var(--primary-2), var(--accent), var(--rose));
      box-shadow: 0 0 22px rgba(212, 163, 115, 0.35);
      transition: width 0.08s linear;
    }

    .cursor-ring {
      position: fixed;
      width: 24px;
      height: 24px;
      border: 1px solid rgba(212, 163, 115, 0.55);
      border-radius: 50%;
      pointer-events: none;
      z-index: 2500;
      opacity: 0;
      transform: translate(-50%, -50%);
      transition: opacity 0.2s ease, width 0.2s ease, height 0.2s ease, border-color 0.2s ease;
    }

    .cursor-ring.is-active {
      opacity: 1;
    }

    .cursor-ring.is-hovering {
      width: 42px;
      height: 42px;
      border-color: rgba(74, 103, 96, 0.55);
      background: rgba(212, 163, 115, 0.06);
    }

    .ambient {
      position: fixed;
      inset: 0;
      z-index: -3;
      pointer-events: none;
      overflow: hidden;
    }

    .ambient .orb {
      position: absolute;
      width: 360px;
      height: 360px;
      border-radius: 50%;
      filter: blur(50px);
      opacity: 0.23;
      animation: orbMove 15s ease-in-out infinite;
    }

    .ambient .orb.one {
      background: var(--accent);
      top: 7%;
      inset-inline-end: -140px;
    }

    .ambient .orb.two {
      background: var(--primary-2);
      bottom: 12%;
      inset-inline-start: -150px;
      animation-delay: 3s;
    }

    .ambient .orb.three {
      background: var(--rose);
      top: 46%;
      inset-inline-end: 32%;
      opacity: 0.14;
      animation-delay: 6s;
    }

    .ambient .orb.four {
      background: var(--mint);
      top: 72%;
      inset-inline-end: 10%;
      opacity: 0.20;
      animation-delay: 9s;
    }

    @keyframes orbMove {
      0%, 100% {
        transform: translate3d(0, 0, 0) scale(1);
      }
      50% {
        transform: translate3d(-26px, 30px, 0) scale(1.07);
      }
    }

    .grain {
      position: fixed;
      inset: 0;
      z-index: -2;
      opacity: 0.26;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 24px 24px;
      mask-image: radial-gradient(circle at center, black, transparent 78%);
    }

    .top-note {
      background: linear-gradient(90deg, var(--primary), var(--accent-2));
      color: white;
      min-height: 38px;
      display: grid;
      place-items: center;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 800;
      position: relative;
      overflow: hidden;
    }

    .top-note::after {
      content: "";
      position: absolute;
      top: 0;
      inset-inline-start: -90px;
      width: 80px;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.35), transparent);
      animation: noteShine 4.6s ease-in-out infinite;
    }

    @keyframes noteShine {
      0% {
        transform: translateX(0);
      }
      55%, 100% {
        transform: translateX(1500px);
      }
    }

    header {
      position: sticky;
      top: 0;
      z-index: 2000;
      background: rgba(248, 249, 246, 0.78);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(20px);
      transition: box-shadow 0.25s ease, background 0.25s ease;
    }

    .dark-mode header {
      background: rgba(24, 33, 30, 0.76);
    }

    header.scrolled {
      box-shadow: 0 14px 42px rgba(54, 75, 68, 0.12);
      background: rgba(248, 249, 246, 0.90);
    }

    .dark-mode header.scrolled {
      background: rgba(24, 33, 30, 0.88);
    }

    .nav {
      min-height: var(--header-height);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-mark {
      width: 54px;
      height: 54px;
      border-radius: 21px;
      color: white;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 32% 24%, rgba(255,255,255,0.50), transparent 30%),
        linear-gradient(135deg, var(--primary-2), var(--accent));
      box-shadow: 0 16px 36px rgba(74, 103, 96, 0.24);
      overflow: hidden;
      position: relative;
      flex: 0 0 auto;
    }

    .brand-mark::after {
      content: "";
      position: absolute;
      inset: -22%;
      background: linear-gradient(120deg, transparent, rgba(255,255,255,0.42), transparent);
      transform: translateX(120%);
      animation: brandShine 5.2s ease-in-out infinite;
    }

    @keyframes brandShine {
      0%, 62% {
        transform: translateX(120%);
      }
      100% {
        transform: translateX(-120%);
      }
    }

    .brand-mark svg {
      width: 31px;
      height: 31px;
      position: relative;
      z-index: 1;
    }

    .brand-text strong {
      display: block;
      font-family: "Amiri", serif;
      font-size: 28px;
      line-height: 1;
      color: var(--ink);
    }

    .brand-text span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 22px;
      list-style: none;
      color: var(--muted);
      font-size: 14px;
      font-weight: 900;
    }

    .nav-links a {
      position: relative;
      padding: 9px 0;
      transition: color 0.25s ease;
    }

    .nav-links a::after {
      content: "";
      position: absolute;
      bottom: 2px;
      inset-inline-start: 0;
      width: 0;
      height: 2px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--accent), var(--primary-2));
      transition: width 0.25s ease;
    }

    .nav-links a:hover,
    .nav-links a.is-active {
      color: var(--primary);
    }

    .nav-links a:hover::after,
    .nav-links a.is-active::after {
      width: 100%;
    }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: 9px;
      flex: 0 0 auto;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      min-height: 48px;
      border-radius: 999px;
      border: 0;
      padding: 13px 20px;
      color: var(--ink);
      background: transparent;
      cursor: pointer;
      font-weight: 900;
      line-height: 1;
      position: relative;
      overflow: hidden;
      white-space: nowrap;
      transition: transform 0.25s ease, box-shadow 0.25s ease, color 0.25s ease, background 0.25s ease;
    }

    .btn::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent, rgba(255,255,255,0.32), transparent);
      transform: translateX(-135%);
      transition: transform 0.65s ease;
      pointer-events: none;
    }

    .btn:hover::before {
      transform: translateX(135%);
    }

    .btn:hover {
      transform: translateY(-3px);
    }

    .btn svg {
      width: 18px;
      height: 18px;
      flex: 0 0 auto;
      position: relative;
      z-index: 1;
    }

    .btn span,
    .btn strong {
      position: relative;
      z-index: 1;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      color: white;
      box-shadow: 0 18px 36px rgba(74, 103, 96, 0.25);
    }

    .btn-primary:hover {
      box-shadow: 0 22px 46px rgba(74, 103, 96, 0.30);
    }

    .btn-soft {
      background: var(--glass-strong);
      border: 1px solid var(--line);
      color: var(--ink);
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(14px);
    }

    .btn-outline {
      color: var(--primary);
      border: 1px solid rgba(74, 103, 96, 0.26);
      background: rgba(255,255,255,0.24);
    }

    .btn-accent {
      background: linear-gradient(135deg, var(--accent-2), var(--accent));
      color: white;
      box-shadow: var(--shadow-accent);
    }

    .btn-whatsapp {
      background: linear-gradient(135deg, #1f9f64, #16764b);
      color: white;
      box-shadow: 0 18px 36px rgba(31, 159, 100, 0.24);
    }

    .round-btn {
      width: 48px;
      height: 48px;
      padding: 0;
      border-radius: 50%;
    }

    .menu-btn {
      display: none;
    }

    .mobile-panel {
      position: fixed;
      inset: 0;
      z-index: 2400;
      display: none;
      pointer-events: none;
    }

    .mobile-panel.is-open {
      display: block;
      pointer-events: auto;
    }

    .mobile-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(15, 22, 20, 0.45);
      backdrop-filter: blur(6px);
      opacity: 0;
      transition: opacity 0.25s ease;
    }

    .mobile-panel.is-open .mobile-backdrop {
      opacity: 1;
    }

    .mobile-drawer {
      position: absolute;
      top: 12px;
      bottom: 12px;
      inset-inline-end: 12px;
      width: min(390px, calc(100% - 24px));
      border-radius: 34px;
      background: var(--glass-strong);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      backdrop-filter: blur(24px);
      padding: 18px;
      transform: translateX(110%);
      transition: transform 0.33s ease;
      overflow: auto;
    }

    [dir="ltr"] .mobile-drawer {
      inset-inline-end: auto;
      inset-inline-start: 12px;
      transform: translateX(-110%);
    }

    .mobile-panel.is-open .mobile-drawer {
      transform: translateX(0);
    }

    .mobile-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 18px;
    }

    .mobile-links {
      list-style: none;
      display: grid;
      gap: 10px;
    }

    .mobile-links a {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 15px 16px;
      border-radius: 18px;
      background: rgba(255,255,255,0.45);
      border: 1px solid var(--line);
      font-weight: 900;
      color: var(--ink);
    }

    .mobile-actions {
      display: grid;
      gap: 10px;
      margin-top: 18px;
    }

    .hero {
      position: relative;
      padding: 76px 0 72px;
      overflow: hidden;
    }

    .hero::before {
      content: "";
      position: absolute;
      top: 25px;
      left: 50%;
      width: min(780px, 88vw);
      height: min(780px, 88vw);
      border-radius: 50%;
      transform: translateX(-50%);
      z-index: -1;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.68), transparent 64%);
      pointer-events: none;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 1.04fr 0.96fr;
      gap: 48px;
      align-items: center;
    }

    .hero-content {
      min-width: 0;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      min-height: 40px;
      padding: 9px 16px;
      border-radius: 999px;
      color: var(--primary);
      background: var(--glass);
      border: 1px solid var(--line);
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(14px);
      font-size: 13px;
      font-weight: 900;
    }

    .eyebrow-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 8px rgba(212, 163, 115, 0.14);
      animation: pulseDot 2.3s ease-in-out infinite;
    }

    @keyframes pulseDot {
      0%, 100% {
        box-shadow: 0 0 0 8px rgba(212, 163, 115, 0.14);
      }
      50% {
        box-shadow: 0 0 0 15px rgba(212, 163, 115, 0.04);
      }
    }

    .hero-name {
      font-family: "Amiri", serif;
      color: var(--primary);
      font-size: clamp(64px, 9vw, 132px);
      line-height: 0.95;
      margin: 22px 0 10px;
      letter-spacing: -2px;
      text-shadow: 0 18px 44px rgba(74, 103, 96, 0.16);
      animation: softGlow 5.4s ease-in-out infinite;
    }

    body.en .hero-name {
      font-family: "Cairo", sans-serif;
      font-size: clamp(54px, 7vw, 104px);
      font-weight: 900;
      letter-spacing: -1px;
    }

    @keyframes softGlow {
      0%, 100% {
        filter: drop-shadow(0 12px 22px rgba(74, 103, 96, 0.11));
      }
      50% {
        filter: drop-shadow(0 17px 34px rgba(212, 163, 115, 0.22));
      }
    }

    h1 {
      font-family: "Amiri", serif;
      font-size: clamp(38px, 5vw, 64px);
      line-height: 1.18;
      margin-bottom: 14px;
      color: var(--ink);
    }

    body.en h1,
    body.en .section-title,
    body.en .quote h2,
    body.en .about-text h2,
    body.en .contact-box h2 {
      font-family: "Cairo", sans-serif;
      font-weight: 900;
      letter-spacing: -0.5px;
    }

    .accent-text {
      color: var(--primary);
      position: relative;
      display: inline-block;
      z-index: 1;
    }

    .accent-text::after {
      content: "";
      position: absolute;
      inset-inline-start: 0;
      bottom: 6px;
      width: 100%;
      height: 13px;
      border-radius: 999px;
      background: rgba(212, 163, 115, 0.22);
      z-index: -1;
    }

    .hero-subtitle {
      font-family: "Amiri", serif;
      color: var(--accent-2);
      font-size: clamp(25px, 3.5vw, 39px);
      font-weight: 700;
      line-height: 1.35;
      margin-bottom: 14px;
    }

    body.en .hero-subtitle {
      font-family: "Cairo", sans-serif;
      font-size: clamp(22px, 3vw, 32px);
      font-weight: 900;
    }

    .lead {
      color: var(--muted);
      line-height: 2;
      font-size: 17px;
      max-width: 690px;
    }

    .hero-actions {
      margin-top: 30px;
      display: flex;
      flex-wrap: wrap;
      gap: 13px;
    }

    .hero-stats {
      margin-top: 31px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 13px;
      max-width: 700px;
    }

    .stat-card {
      min-height: 112px;
      padding: 17px;
      border-radius: 24px;
      background: var(--glass);
      border: 1px solid rgba(255,255,255,0.70);
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(18px);
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .stat-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-accent);
    }

    .stat-number {
      display: block;
      color: var(--primary);
      font-size: 24px;
      line-height: 1.1;
      font-weight: 900;
    }

    .stat-card span:last-child {
      display: block;
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
      font-weight: 700;
    }

    .hero-visual {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
      perspective: 1200px;
    }

    .hero-main-card {
      position: relative;
      border-radius: 40px;
      overflow: hidden;
      aspect-ratio: 16 / 10;
      background: var(--cream);
      border: 1px solid rgba(255,255,255,0.86);
      box-shadow: var(--shadow);
      transform: rotateY(-2deg) rotateX(1deg);
      transition: transform 0.35s ease;
    }

    body.en .hero-main-card {
      transform: rotateY(2deg) rotateX(1deg);
    }

    .hero-visual:hover .hero-main-card {
      transform: rotateY(0deg) rotateX(0deg) translateY(-4px);
    }

    .hero-main-card video,
    .hero-main-card img,
    .mini-media video,
    .mini-media img,
    .image-card img,
    .profile-img img,
    .contact-img img,
    .gallery-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .hero-main-card video,
    .mini-media video {
      display: block;
      background: var(--cream);
    }

    .hero-main-card::after,
    .mini-media::after,
    .image-card::after,
    .profile-img::after,
    .contact-img::after,
    .gallery-card::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(145deg, rgba(255,255,255,0.22), transparent 42%, rgba(38,52,47,0.13));
    }

    .hero-side-row {
      display: grid;
      grid-template-columns: 0.95fr 1.05fr;
      gap: 16px;
    }

    .mini-media {
      position: relative;
      min-height: 220px;
      border-radius: 30px;
      overflow: hidden;
      background: var(--cream);
      border: 7px solid rgba(255,255,255,0.72);
      box-shadow: var(--shadow-soft);
      animation: floaty 6.5s ease-in-out infinite;
    }

    .floating-note {
      position: relative;
      min-height: 220px;
      padding: 22px;
      border-radius: 30px;
      background: var(--glass-strong);
      border: 1px solid rgba(255,255,255,0.86);
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(18px);
      display: flex;
      flex-direction: column;
      justify-content: center;
      animation: floaty 7.2s ease-in-out infinite;
    }

    @keyframes floaty {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-10px);
      }
    }

    .floating-note h3 {
      font-size: 21px;
      margin-bottom: 8px;
      color: var(--ink);
    }

    .floating-note p {
      color: var(--muted);
      line-height: 1.9;
      font-size: 14px;
    }

    .progress-line {
      margin-top: 16px;
      height: 8px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(74,103,96,0.14);
    }

    .progress-line span {
      display: block;
      height: 100%;
      width: 65%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--primary-2), var(--accent));

        width: 58%;

      50% {
        width: 86%;
      }

    section {
      position: relative;
      padding: 84px 0;
    }

    .section-head {
      max-width: 790px;
      margin: 0 auto 44px;
      text-align: center;
    }

    .kicker {
      color: var(--primary);
      font-size: 14px;
      font-weight: 900;
      margin-bottom: 10px;
    }

    .section-title {
      font-family: "Amiri", serif;
      font-size: clamp(34px, 5vw, 58px);
      line-height: 1.15;
      margin-bottom: 14px;
      color: var(--ink);
    }

    .section-desc {
      color: var(--muted);
      line-height: 2;
      font-size: 16px;
    }

    .feature-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 18px;
    }

    .feature-card {
      position: relative;
      min-height: 270px;
      border-radius: 30px;
      padding: 28px 23px;
      background: var(--glass);
      border: 1px solid rgba(255,255,255,0.74);
      box-shadow: var(--shadow-soft);
      overflow: hidden;
      backdrop-filter: blur(18px);
      transform-style: preserve-3d;
      transition: transform 0.28s ease, box-shadow 0.28s ease, background 0.28s ease;
    }

    .feature-card::after {
      content: "";
      position: absolute;
      width: 170px;
      height: 170px;
      border-radius: 50%;
      inset-inline-end: -68px;
      bottom: -90px;
      background: rgba(212, 163, 115, 0.12);
      pointer-events: none;
    }

    .feature-card:hover {
      box-shadow: var(--shadow);
      background: var(--glass-strong);
    }

    .icon-box {
      width: 58px;
      height: 58px;
      display: grid;
      place-items: center;
      border-radius: 20px;
      margin-bottom: 18px;
      color: var(--primary);
      background: linear-gradient(135deg, rgba(74,103,96,0.16), rgba(212,163,115,0.14));
      transition: transform 0.25s ease;
      position: relative;
      z-index: 1;
    }

    .feature-card:hover .icon-box {
      transform: rotate(-4deg) scale(1.08);
    }

    body.en .feature-card:hover .icon-box {
      transform: rotate(4deg) scale(1.08);
    }

    .icon-box svg {
      width: 29px;
      height: 29px;
    }

    .feature-card h3 {
      font-size: 21px;
      margin-bottom: 10px;
      color: var(--ink);
      position: relative;
      z-index: 1;
    }

    .feature-card p {
      color: var(--muted);
      line-height: 1.9;
      font-size: 14px;
      position: relative;
      z-index: 1;
    }

    .about-box {
      display: grid;
      grid-template-columns: 0.9fr 1.1fr;
      gap: 42px;
      align-items: center;
      position: relative;
      overflow: hidden;
      border-radius: 42px;
      padding: 28px;
      background: var(--glass);
      border: 1px solid rgba(255,255,255,0.76);
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(18px);
    }

    .about-box::before {
      content: "";
      position: absolute;
      width: 280px;
      height: 280px;
      border-radius: 50%;
      background: rgba(74,103,96,0.10);
      inset-inline-start: -98px;
      top: -98px;
    }

    .profile-img {
      position: relative;
      min-height: 520px;
      border-radius: 36px;
      overflow: hidden;
      box-shadow: var(--shadow);
      background: var(--cream);
      z-index: 1;
    }

    .about-text {
      position: relative;
      z-index: 1;
      padding: 18px;
    }

    .about-text h2 {
      font-family: "Amiri", serif;
      font-size: clamp(34px, 5vw, 56px);
      line-height: 1.15;
      margin-bottom: 18px;
    }

    .about-text p {
      color: var(--muted);
      line-height: 2.05;
      margin-bottom: 16px;
    }

    .chips {
      margin: 24px 0;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 13px;
    }

    .chip {
      padding: 16px;
      border-radius: 20px;
      background: rgba(255,255,255,0.58);
      border: 1px solid rgba(255,255,255,0.72);
      color: var(--muted);
      line-height: 1.75;
      font-weight: 700;
      backdrop-filter: blur(16px);
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .chip:hover {
      transform: translateY(-5px);
      box-shadow: var(--shadow-soft);
    }

    .chip strong {
      display: block;
      color: var(--ink);
      margin-bottom: 4px;
    }

    .soft-section {
      background: linear-gradient(180deg, rgba(223,233,227,0.60), rgba(255,253,248,0.58));
      border-block: 1px solid var(--line);
    }

    .steps-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
      counter-reset: step;
    }

    .step-card {
      counter-increment: step;
      position: relative;
      min-height: 260px;
      padding: 30px;
      border-radius: 30px;
      background: var(--glass-strong);
      border: 1px solid rgba(255,255,255,0.76);
      box-shadow: var(--shadow-soft);
      overflow: hidden;
      backdrop-filter: blur(18px);
      transition: transform 0.28s ease, box-shadow 0.28s ease;
    }

    .step-card:hover {
      transform: translateY(-7px);
      box-shadow: var(--shadow-accent);
    }

    .step-card::before {
      content: counter(step, decimal-leading-zero);
      position: absolute;
      top: 10px;
      inset-inline-start: 22px;
      direction: ltr;
      font-size: 54px;
      color: rgba(212, 163, 115, 0.17);
      font-weight: 900;
      pointer-events: none;
    }

    .step-card h3 {
      font-size: 22px;
      margin-bottom: 11px;
      position: relative;
      z-index: 1;
    }

    .step-card p {
      color: var(--muted);
      line-height: 1.9;
      font-size: 14px;
      position: relative;
      z-index: 1;
    }

    .experience-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 26px;
    }

    .experience-panel {
      position: relative;
      min-height: 430px;
      padding: 34px;
      border-radius: var(--radius-xl);
      background: var(--glass);
      border: 1px solid rgba(255,255,255,0.76);
      box-shadow: var(--shadow-soft);
      overflow: hidden;
      backdrop-filter: blur(18px);
      transition: transform 0.28s ease, box-shadow 0.28s ease;
    }

    .experience-panel:hover {
      transform: translateY(-7px);
      box-shadow: var(--shadow);
    }

    .experience-panel.image-bg {
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      color: white;
      background:
        linear-gradient(rgba(38, 52, 47, 0.23), rgba(38, 52, 47, 0.23)),
        url("Images/amna-calm.png") center/cover;
    }

    .experience-panel.image-bg::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(0deg, rgba(38,52,47,0.45), transparent 72%);
    }

    .experience-panel.image-bg > * {
      position: relative;
      z-index: 1;
    }

    .experience-panel h2 {
      font-family: "Amiri", serif;
      font-size: clamp(32px, 4vw, 46px);
      line-height: 1.18;
      margin-bottom: 16px;
    }

    .experience-panel p {
      color: var(--muted);
      line-height: 2;
    }

    .experience-panel.image-bg p,
    .experience-panel.image-bg .small-label {
      color: rgba(255,255,255,0.90);
    }

    .small-label {
      color: var(--primary);
      font-size: 13px;
      font-weight: 900;
      margin-bottom: 10px;
    }

    .soft-list {
      display: grid;
      gap: 12px;
      margin-top: 22px;
    }

    .soft-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 13px;
      border-radius: 17px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.58);
      font-weight: 800;
      transition: transform 0.25s ease, background 0.25s ease;
    }

    .soft-item:hover {
      transform: translateX(-6px);
      background: rgba(255,255,255,0.82);
    }

    body.en .soft-item:hover {
      transform: translateX(6px);
    }

    .soft-check {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: var(--primary);
      background: rgba(74,103,96,0.14);
      flex: 0 0 auto;
    }

    .soft-check svg {
      width: 15px;
      height: 15px;
    }

    .tabs-shell {
      background: var(--glass);
      border: 1px solid rgba(255,255,255,0.74);
      box-shadow: var(--shadow-soft);
      border-radius: 38px;
      padding: 18px;
      backdrop-filter: blur(18px);
    }

    .tabs-nav {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 18px;
    }

    .tab-btn {
      padding: 14px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.52);
      color: var(--muted);
      font-weight: 900;
      cursor: pointer;
      transition: background 0.25s ease, color 0.25s ease, transform 0.25s ease;
    }

    .tab-btn:hover {
      transform: translateY(-3px);
    }

    .tab-btn.is-active {
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      color: white;
      border-color: transparent;
    }

    .tab-panel {
      display: none;
      grid-template-columns: 0.9fr 1.1fr;
      gap: 18px;
      align-items: stretch;
      min-height: 360px;
    }

    .tab-panel.is-active {
      display: grid;
      animation: fadeIn 0.35s ease both;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .tab-image {
      position: relative;
      min-height: 340px;
      border-radius: 28px;
      overflow: hidden;
      background: var(--cream);
    }

    .tab-image img {
      height: 100%;
      object-fit: cover;
    }

    .tab-content {
      padding: 26px;
      border-radius: 28px;
      background: rgba(255,255,255,0.52);
      border: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .tab-content h3 {
      font-size: 26px;
      margin-bottom: 10px;
      color: var(--primary);
    }

    .tab-content p {
      color: var(--muted);
      line-height: 2;
      margin-bottom: 18px;
    }

    .tab-list {
      list-style: none;
      display: grid;
      gap: 10px;
    }

    .tab-list li {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      color: var(--muted);
      line-height: 1.8;
      font-weight: 700;
    }

    .tab-list li::before {
      content: "";
      width: 8px;
      height: 8px;
      margin-top: 10px;
      border-radius: 50%;
      background: var(--accent);
      flex: 0 0 auto;
    }

    .image-strip {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr 1fr;
      gap: 16px;
      height: 530px;
    }

    .image-stack {
      display: grid;
      gap: 16px;
    }

    .image-card,
    .gallery-card {
      position: relative;
      border-radius: 32px;
      overflow: hidden;
      background: var(--cream);
      box-shadow: var(--shadow-soft);
      transition: transform 0.35s ease, box-shadow 0.35s ease;
    }

    .image-card:hover,
    .gallery-card:hover {
      transform: translateY(-7px);
      box-shadow: var(--shadow);
    }

    .image-card img,
    .gallery-card img {
      transition: transform 0.65s ease;
    }

    .image-card:hover img,
    .gallery-card:hover img {
      transform: scale(1.06);
    }

    .quote {
      position: relative;
      overflow: hidden;
      border-radius: 42px;
      padding: clamp(34px, 6vw, 70px);
      color: white;
      background:
        linear-gradient(135deg, rgba(74, 103, 96, 0.92), rgba(184, 134, 91, 0.85)),
        url("Images/amna-abstract.png") center/cover;
      box-shadow: var(--shadow);
    }

    .quote::before {
      content: "";
      position: absolute;
      inset-inline-start: -90px;
      top: -90px;
      width: 280px;
      height: 280px;
      border-radius: 50%;
      background: rgba(255,255,255,0.13);
      animation: quoteOrb 8s ease-in-out infinite;

    @keyframes quoteOrb {
      0%, 100% {
        transform: translate(0, 0);
      }
      50% {
        transform: translate(28px, 22px);
      }

    .quote h2,
    .quote p,
    .quote .quote-actions {
      position: relative;
      z-index: 1;
    }

    .quote h2 {
      font-family: "Amiri", serif;
      font-size: clamp(34px, 5vw, 61px);
      line-height: 1.25;
      max-width: 900px;
      margin-bottom: 16px;
    }

    .quote p {
      max-width: 790px;
      color: rgba(255,255,255,0.90);
      line-height: 2;
    }

    .quote-actions {
      margin-top: 24px;
      display: flex;
      flex-wrap: wrap;
      gap: 13px;
    }

    .packages-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
    }

    .package-card {
      position: relative;
      overflow: hidden;
      padding: 30px;
      border-radius: 32px;
      background: var(--glass);
      border: 1px solid rgba(255,255,255,0.76);
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(18px);
      transition: transform 0.28s ease, box-shadow 0.28s ease;
    }

    .package-card::before {
      content: "";
      position: absolute;
      inset: -1px;
      border-radius: inherit;
      background: linear-gradient(135deg, rgba(74,103,96,0.16), transparent 45%, rgba(212,163,115,0.14));
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }

    .package-card:hover {
      transform: translateY(-8px);
      box-shadow: var(--shadow);
    }

    .package-card:hover::before {
      opacity: 1;
    }

    .package-card.highlight {
      transform: translateY(-10px);
      background: linear-gradient(180deg, rgba(255,255,255,0.92), rgba(255,253,248,0.82));
      border-color: rgba(212,163,115,0.35);
      box-shadow: var(--shadow);
    }

    .dark-mode .package-card.highlight {
      background: linear-gradient(180deg, rgba(35,48,43,0.96), rgba(42,56,50,0.86));
    }

    .package-card.highlight:hover {
      transform: translateY(-14px);
    }

    .package-card p,
    .package-card ul,
    .package-card .price,
    .package-card .btn {
      position: relative;
      z-index: 1;
    }

    .package-card h3 {
      font-size: 22px;
      margin-bottom: 8px;
    }

    .package-card p {
      color: var(--muted);
      line-height: 1.9;
      font-size: 14px;
      margin-bottom: 18px;
    }

    .price {
      color: var(--primary);
      font-weight: 900;
      font-size: 30px;
      line-height: 1.4;
      margin-bottom: 18px;
    }

    .package-card ul {
      list-style: none;
      display: grid;
      gap: 12px;
      margin-bottom: 24px;
    }

    .package-card li {
      display: flex;
      gap: 10px;
      color: var(--muted);
      font-weight: 800;
      line-height: 1.7;
    }

    .package-card li svg {
      width: 18px;
      height: 18px;
      color: var(--primary);
      flex: 0 0 auto;
      margin-top: 5px;
    }

    .interactive-area {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      align-items: start;
    }

    .tool-card {
      border-radius: 34px;
      padding: 28px;
      background: var(--glass);
      border: 1px solid rgba(255,255,255,0.74);
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(18px);
    }

    .tool-card h3 {
      color: var(--primary);
      font-size: 24px;
      margin-bottom: 10px;
    }

    .tool-card p {
      color: var(--muted);
      line-height: 1.9;
      margin-bottom: 18px;
    }

    .mood-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
    }

    .mood-btn {
      min-height: 86px;
      padding: 12px;
      border-radius: 20px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.54);
      cursor: pointer;
      display: grid;
      place-items: center;
      gap: 6px;
      color: var(--muted);
      font-weight: 900;
      transition: transform 0.25s ease, background 0.25s ease, border-color 0.25s ease;
    }

    .mood-btn:hover {
      transform: translateY(-5px);
    }

    .mood-btn.is-selected {
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      color: white;
      border-color: transparent;
    }

    .mood-btn svg {
      width: 26px;
      height: 26px;
    }

    .breathing-circle-wrap {
      display: grid;
      place-items: center;
      padding: 26px 0 12px;
    }

      width: 190px;
      height: 190px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: white;
      font-weight: 900;
      background: radial-gradient(circle at 35% 24%, rgba(255,255,255,0.38), transparent 35%), linear-gradient(135deg, var(--primary), var(--accent));
      box-shadow: 0 18px 46px rgba(74,103,96,0.22);
      transform: scale(1);
      transition: transform 1.6s ease-in-out;

        transform: scale(0.88);
      }
      50% {
        transform: scale(1.14);
      }
    }

    .breathing-actions {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }

    .checklist {
      display: grid;
      gap: 10px;
    }

    .check-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 13px 14px;
      border-radius: 18px;
      background: rgba(255,255,255,0.54);
      border: 1px solid var(--line);
      color: var(--muted);
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.25s ease, background 0.25s ease;
    }

    .check-row:hover {
      transform: translateX(-5px);
      background: rgba(255,255,255,0.78);
    }

      transform: translateX(5px);
    }

    .check-row input {
      width: 18px;
      height: 18px;
      accent-color: var(--primary);
    }

    .score-box {
      margin-top: 16px;
      padding: 16px;
      border-radius: 20px;
      background: rgba(74,103,96,0.10);
      color: var(--primary);
      font-weight: 900;
      line-height: 1.8;
      text-align: center;
    }

    .faq-layout {

      grid-template-columns: 0.9fr 1.1fr;
      gap: 28px;
      align-items: start;
    }

    .faq-img {
      position: sticky;
      top: 112px;
      height: 525px;
      border-radius: 36px;
      overflow: hidden;
      background: var(--cream);
      box-shadow: var(--shadow);

    .faq-img img {
      height: 100%;
      object-fit: cover;
    }

    .faq-list {
      display: grid;
      gap: 14px;
    }

    details {
      padding: 18px 20px;
      border-radius: 24px;
      background: var(--glass);
      border: 1px solid rgba(255,255,255,0.76);
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(18px);
      transition: transform 0.25s ease, box-shadow 0.25s ease;

      display: grid;

      transition: transform 0.25s ease;

      color: var(--muted);

      font-size: 14px;

      grid-template-columns: 1.05fr 0.95fr;
      gap: 30px;
      align-items: center;
      position: relative;
      overflow: hidden;
      border-radius: 42px;
      padding: clamp(28px, 5vw, 56px);
      background: var(--glass-strong);
      border: 1px solid rgba(255,255,255,0.78);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .contact-box::before {
      content: "";
      position: absolute;
      width: 350px;
      height: 350px;
      border-radius: 50%;
      background: rgba(212,163,115,0.12);
      inset-inline-end: -145px;
      bottom: -145px;
    }

      position: relative;
      z-index: 1;
    }

    .contact-box h2 {
      font-family: "Amiri", serif;
      font-size: clamp(34px, 5vw, 58px);
      line-height: 1.16;
      margin-bottom: 15px;
    }

    .contact-box p {
      color: var(--muted);
      line-height: 2;
      margin-bottom: 24px;
    }

    .contact-img {
      min-height: 420px;
      border-radius: 34px;
      overflow: hidden;
      background: var(--cream);
      box-shadow: var(--shadow-soft);
      position: relative;
    }

    .booking-form {
      display: grid;
      gap: 12px;
      margin-top: 20px;
    }

    .field-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .field {
      position: relative;
    }

    .field input,
    .field textarea,
    .field select {
      width: 100%;
      min-height: 52px;
      border-radius: 17px;
      border: 1px solid var(--line);
      outline: none;
      padding: 14px 16px;
      background: rgba(255,255,255,0.58);
      color: var(--ink);
      transition: border-color 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
    }

    .field textarea {
      min-height: 120px;
      resize: vertical;
    }

    .field input:focus,
    .field textarea:focus,
    .field select:focus {
      border-color: rgba(74,103,96,0.52);
      box-shadow: 0 0 0 4px rgba(74,103,96,0.10);
      background: rgba(255,255,255,0.82);
    }

    .legal-note {
      margin-top: 18px;
      padding: 16px;
      border-radius: 20px;
      background: rgba(255,255,255,0.56);
      border: 1px solid rgba(255,255,255,0.70);
      color: var(--muted);
      line-height: 1.9;
      font-size: 13px;
      backdrop-filter: blur(14px);
    }

    footer {
      margin-top: 10px;
      background: #23312d;
      color: rgba(255,255,255,0.82);
      padding: 48px 0 28px;
    }

    .footer-grid {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr 0.8fr;
      gap: 24px;
      margin-bottom: 28px;
    }

    footer h3 {
      font-family: "Amiri", serif;
      color: white;
      font-size: 29px;
      margin-bottom: 12px;
    }

    footer p,
    footer a {
      color: rgba(255,255,255,0.72);
      line-height: 1.9;
      font-size: 14px;
    }

    .footer-links {
      display: grid;
      gap: 8px;
    }

    .footer-links a {
      transition: color 0.25s ease, transform 0.25s ease;
    }

    .footer-links a:hover {
      color: white;
      transform: translateX(-4px);
    }

    body.en .footer-links a:hover {
      transform: translateX(4px);
    }

    .footer-bottom {
      border-top: 1px solid rgba(255,255,255,0.12);
      padding-top: 22px;
      display: flex;
      justify-content: space-between;
      gap: 18px;
      flex-wrap: wrap;
      color: rgba(255,255,255,0.55);
      font-size: 13px;
    }

    .floating-actions {
      position: fixed;
      inset-inline-start: 18px;
      bottom: calc(18px + var(--safe-bottom));
      z-index: 2100;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    body.en .floating-actions {
      inset-inline-start: auto;
      inset-inline-end: 18px;
      flex-direction: row-reverse;
    }

    .floating-label {
      padding: 12px 16px;
      border-radius: 999px;
      color: var(--ink);
      background: var(--glass-strong);
      border: 1px solid var(--line);
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(14px);
      font-size: 13px;
      font-weight: 900;
      white-space: nowrap;
      transition: transform 0.25s ease, color 0.25s ease;
    }

    .floating-label:hover {
      transform: translateY(-3px);
      color: var(--primary);
    }

    .floating-whatsapp {
      width: 58px;
      height: 58px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: white;
      background: linear-gradient(135deg, #1f9f64, #16764b);
      box-shadow: 0 18px 40px rgba(31,159,100,0.32);
      animation: whatsappPulse 2.5s ease-in-out infinite;
      transition: transform 0.25s ease;
    }

    @keyframes whatsappPulse {
      0%, 100% {
        box-shadow: 0 18px 40px rgba(31,159,100,0.32), 0 0 0 0 rgba(31,159,100,0.22);
      }
      50% {
        box-shadow: 0 18px 40px rgba(31,159,100,0.32), 0 0 0 12px rgba(31,159,100,0);
      }
    }

    .floating-whatsapp:hover {
      transform: translateY(-4px) scale(1.04);
    }

    .floating-whatsapp svg {
      width: 30px;
      height: 30px;
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 2600;
      display: none;
      place-items: center;
      padding: 18px;
    }

    .modal.is-open {
      display: grid;
    }

    .modal-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(15,22,20,0.50);
      backdrop-filter: blur(8px);
    }

    .modal-card {
      position: relative;
      width: min(620px, 100%);
      max-height: min(760px, 94vh);
      overflow: auto;
      border-radius: 34px;
      background: var(--paper);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      padding: 22px;
      animation: modalIn 0.25s ease both;
    }

    @keyframes modalIn {
      from {
        opacity: 0;
        transform: translateY(18px) scale(0.98);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 18px;
    }

    .modal-head h3 {
      font-size: 24px;
      color: var(--primary);
    }

    .toast {
      position: fixed;
      inset-inline-end: 18px;
      bottom: calc(18px + var(--safe-bottom));
      z-index: 2800;
      width: min(360px, calc(100% - 36px));
      padding: 14px 16px;
      border-radius: 20px;
      color: white;
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      box-shadow: var(--shadow);
      transform: translateY(20px);
      opacity: 0;
      pointer-events: none;
      transition: transform 0.25s ease, opacity 0.25s ease;
      line-height: 1.7;
      font-weight: 800;
    }

    .toast.is-visible {
      transform: translateY(0);
      opacity: 1;
    }

    .reveal {
      opacity: 0;
      transform: translateY(24px);
      transition: opacity 0.75s ease, transform 0.75s ease;
    }

    .reveal.from-left {
      transform: translateX(-26px);
    }

    .reveal.from-right {
      transform: translateX(26px);
    }

    .reveal.is-visible {
      opacity: 1;
      transform: translate(0, 0);
    }

    .delay-1 {
      transition-delay: 0.12s;
    }

    .delay-2 {
      transition-delay: 0.24s;
    }

    .delay-3 {
      transition-delay: 0.36s;
    }

    .tilt-card {
      transform-style: preserve-3d;
    }

    .icon-flip {
      transition: transform 0.2s ease;
    }

    html[dir="rtl"] .icon-flip {
      transform: scaleX(-1);
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: 0.01ms !important;
      }
    }

      });
      links.forEach(function(link) {
        link.classList.toggle("is-active", link.getAttribute("href") === "#" + activeId);
      });
    }

    function openMenu() {
      mobilePanel.classList.add("is-open");
      mobilePanel.setAttribute("aria-hidden", "false");
      body.classList.add("no-scroll");
    }

    function closeMenu() {
      mobilePanel.classList.remove("is-open");
      mobilePanel.setAttribute("aria-hidden", "true");
      body.classList.remove("no-scroll");
    }

    function openModal() {
      bookingModal.classList.add("is-open");
      bookingModal.setAttribute("aria-hidden", "false");
      body.classList.add("no-scroll");
    }

    function closeModal() {
      bookingModal.classList.remove("is-open");
      bookingModal.setAttribute("aria-hidden", "true");
      body.classList.remove("no-scroll");
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("is-visible");
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(function() {
        toast.classList.remove("is-visible");
      }, 3300);
    }

    function buildBookingMessage(source) {
      const lang = currentLang();
      const isModal = source === "modal";
      const name = document.getElementById(isModal ? "modalName" : "clientName").value.trim();
      const phone = document.getElementById(isModal ? "modalPhone" : "clientPhone").value.trim();
      const message = document.getElementById(isModal ? "modalMessage" : "clientMessage").value.trim();
      const topic = isModal ? "" : document.getElementById("clientTopic").value;
      const time = isModal ? "" : document.getElementById("clientTime").value;

      if (lang === "ar") {
        return [
          "مرحباً، أريد حجز موعد مع د. آمنة.",
          name ? "الاسم: " + name : "",
          phone ? "رقم الهاتف: " + phone : "",
          topic ? "موضوع الجلسة: " + topic : "",
          time ? "الوقت المناسب: " + time : "",
          message ? "ملاحظة: " + message : ""
        ].filter(Boolean).join("\n");
      }

      return [
        "Hello, I would like to book an appointment with Dr. Amna.",
        name ? "Name: " + name : "",
        phone ? "Phone: " + phone : "",
        topic ? "Session topic: " + topic : "",
        time ? "Preferred time: " + time : "",
        message ? "Note: " + message : ""
      ].filter(Boolean).join("\n");
    }

    function handleBookingForm(event, source) {
      event.preventDefault();
      const lang = currentLang();
      const customMessage = buildBookingMessage(source);
      window.open(getWhatsAppUrl("booking", lang, customMessage), "_blank", "noopener");
      showToast(lang === "ar" ? "تم تجهيز رسالة واتساب للحجز." : "WhatsApp booking message is ready.");
      if (source === "modal") {
        closeModal();
      }
    }

    function updateToolTexts(lang) {
      const moodResult = document.getElementById("moodResult");
      const checkScore = document.getElementById("checkScore");
      if (moodResult && !moodResult.dataset.selected) {
        moodResult.textContent = translations[lang].moodHint;
      }
      if (checkScore && !checkScore.dataset.changed) {
        checkScore.textContent = translations[lang].checkScoreInitial;
      }
    }

    function initReveal() {
      const observer = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
          if (entry.isIntersecting) {
            entry.target.classList.add("is-visible");
            observer.unobserve(entry.target);
          }
        });
      }, { threshold: 0.12 });

      document.querySelectorAll(".reveal").forEach(function(element) {
        observer.observe(element);
      });
    }

    function initTilt() {
      if (window.innerWidth <= 768) return;
      document.querySelectorAll(".tilt-card").forEach(function(card) {
        card.addEventListener("mousemove", function(event) {
          const rect = card.getBoundingClientRect();
          const x = event.clientX - rect.left;
          const y = event.clientY - rect.top;
          const centerX = rect.width / 2;
          const centerY = rect.height / 2;
          const rotateX = ((y - centerY) / centerY) * -4;
          const rotateY = ((x - centerX) / centerX) * 4;
          card.style.transform = "translateY(-6px) rotateX(" + rotateX + "deg) rotateY(" + rotateY + "deg)";
        });

        card.addEventListener("mouseleave", function() {
          card.style.transform = "";
        });
      });
    }

    function initCounters() {
      const values = { stat1: 100, stat2: 4, stat3: 7 };
      const counterObserver = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
          if (!entry.isIntersecting) return;
          const target = entry.target;
          const key = target.getAttribute("data-counter");
          const finalValue = values[key] || 0;
          const suffix = key === "stat1" ? "%" : key === "stat2" ? "+" : "";
          let current = 0;
          const step = Math.max(1, Math.ceil(finalValue / 36));
          const timer = setInterval(function() {
            current += step;
            if (current >= finalValue) {
              current = finalValue;
              clearInterval(timer);
            }
            target.textContent = current + suffix;
          }, 28);
          counterObserver.unobserve(target);
        });
      }, { threshold: 0.5 });

      document.querySelectorAll("[data-counter]").forEach(function(counter) {
        counterObserver.observe(counter);
      });
    }

    function initTabs() {
      document.querySelectorAll("[data-tab]").forEach(function(button) {
        button.addEventListener("click", function() {
          const id = button.getAttribute("data-tab");
          document.querySelectorAll("[data-tab]").forEach(function(btn) { btn.classList.remove("is-active"); });
          document.querySelectorAll(".tab-panel").forEach(function(panel) { panel.classList.remove("is-active"); });
          button.classList.add("is-active");
          document.getElementById(id).classList.add("is-active");
        });
      });
    }

    function initFaq() {
      document.querySelectorAll("details").forEach(function(detail) {
        detail.addEventListener("toggle", function() {
          if (detail.open && detail.closest(".faq-list")) {
            document.querySelectorAll(".faq-list details").forEach(function(other) {
              if (other !== detail) other.open = false;
            });
          }
        });
      });
    }

    function initCursor() {
      if (!cursorRing || window.innerWidth < 900) return;
      window.addEventListener("mousemove", function(event) {
        cursorRing.style.left = event.clientX + "px";
        cursorRing.style.top = event.clientY + "px";
        cursorRing.classList.add("is-active");
      });
      document.querySelectorAll("a, button, input, textarea, select").forEach(function(element) {
        element.addEventListener("mouseenter", function() { cursorRing.classList.add("is-hovering"); });
        element.addEventListener("mouseleave", function() { cursorRing.classList.remove("is-hovering"); });
      });
    }

    function initMoodTool() {
      const lang = currentLang();
      const moodResult = document.getElementById("moodResult");
      const suggestions = {
        ar: [
          "اقتراح اليوم: حافظ على خطوة صغيرة ثابتة ولا تكثر المهام.",
          "اقتراح اليوم: اختر أولوية واحدة ولا تجعل القائمة طويلة.",
          "اقتراح اليوم: اكتب الخيارات على ورقة قبل اتخاذ قرار.",
          "اقتراح اليوم: خفف المتطلبات وابدأ بخمس دقائق تهدئة.",
          "اقتراح اليوم: استثمر حماسك في عادة بسيطة قابلة للاستمرار."
        ],
        en: [
          "Today’s suggestion: Keep one small steady step.",
          "Today’s suggestion: Choose one priority and keep the list short.",
          "Today’s suggestion: Write your options before deciding.",
          "Today’s suggestion: Reduce demands and start with five calm minutes.",
          "Today’s suggestion: Turn motivation into one sustainable habit."
        ]
      };

      document.querySelectorAll(".mood-btn").forEach(function(button) {
        button.addEventListener("click", function() {
          document.querySelectorAll(".mood-btn").forEach(function(btn) { btn.classList.remove("is-selected"); });
          button.classList.add("is-selected");
          const index = Number(button.getAttribute("data-mood")) - 1;
          moodResult.dataset.selected = "true";
          moodResult.textContent = suggestions[currentLang()][index];
        });
      });
    }

    function initBreathing() {
      const circle = document.getElementById("breathingCircle");
      const start = document.getElementById("breathStart");
      const stop = document.getElementById("breathStop");
      if (!circle || !start || !stop) return;
      start.addEventListener("click", function() {
        circle.classList.add("is-breathing");
        circle.textContent = currentLang() === "ar" ? "تنفّس" : "Breathe";
      });
      stop.addEventListener("click", function() {
        circle.classList.remove("is-breathing");
        circle.textContent = translations[currentLang()].breatheReady;
      });
    }

    function initChecklist() {
      const score = document.getElementById("checkScore");
      document.querySelectorAll("[data-check]").forEach(function(check) {
        check.addEventListener("change", function() {
          const selected = document.querySelectorAll("[data-check]:checked").length;
          score.dataset.changed = "true";
          score.textContent = currentLang() === "ar" ? "اخترت " + selected + " من 5 عناصر. هذا يساعد على تجهيز جلسة أوضح." : "You selected " + selected + " of 5 items. This helps prepare a clearer session.";
        });
      });
    }

    function initJournal() {
      const prompts = ["journalPrompt1", "journalPrompt2", "journalPrompt3", "journalPrompt4"];
      const box = document.getElementById("journalPrompt");
      const button = document.getElementById("newPrompt");
      let current = 0;
      button.addEventListener("click", function() {
        current = (current + 1) % prompts.length;
        box.textContent = translations[currentLang()][prompts[current]];
      });
    }

    document.querySelectorAll("img").forEach(function(img) {
      img.addEventListener("error", function() {
        this.style.display = "none";
        const parent = this.parentElement;
        if (parent) {
          parent.style.background = "linear-gradient(135deg, rgba(74,103,96,0.18), rgba(212,163,115,0.16))";
        }
      });
    });

    document.querySelectorAll("video").forEach(function(video) {
      video.addEventListener("error", function() {
        this.style.display = "none";
        if (this.nextElementSibling) {
          this.nextElementSibling.style.display = "block";
        }
      });
    });

    langBtn.addEventListener("click", function() {
      setLanguage(currentLang() === "ar" ? "en" : "ar");
    });

    themeBtn.addEventListener("click", function() {
      setTheme(body.classList.contains("dark-mode") ? "light" : "dark");
    });

    menuBtn.addEventListener("click", openMenu);
    document.querySelectorAll("[data-close-menu]").forEach(function(element) {
      element.addEventListener("click", closeMenu);
    });

    document.querySelectorAll("[data-open-modal]").forEach(function(element) {
      element.addEventListener("click", openModal);
    });

    document.querySelectorAll("[data-close-modal]").forEach(function(element) {
      element.addEventListener("click", closeModal);
    });

    document.addEventListener("keydown", function(event) {
      if (event.key === "Escape") {
        closeMenu();
        closeModal();
      }
    });

    document.getElementById("bookingForm").addEventListener("submit", function(event) {
      handleBookingForm(event, "main");
    });

    document.getElementById("modalForm").addEventListener("submit", function(event) {
      handleBookingForm(event, "modal");
    });

    window.addEventListener("scroll", updateScrollEffects, { passive: true });
    window.addEventListener("resize", updateScrollEffects);

    setTheme(localStorage.getItem("amnaTheme") || "light");
    setLanguage(currentLang());
    initReveal();
    initTilt();
    initCounters();
    initTabs();
    initFaq();
    initCursor();
    initMoodTool();
    initBreathing();
    initChecklist();
    initJournal();
    updateScrollEffects();
  </script>
</body>
</html>
